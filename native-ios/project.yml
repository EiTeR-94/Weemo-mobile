name: WineNative
options:
  bundleIdPrefix: fr.eiter
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"  # Priority 5: basic iPad support (in addition to iPhone)
    INFOPLIST_FILE: WineNative/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: fr.eiter.plexiwine
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    DEVELOPMENT_TEAM: ""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  WineNative:
    type: application
    platform: iOS
    sources:
      - path: WineNative/Sources
      - path: WineNative/Resources/Assets.xcassets
    # Theme 1: Tests/ dir added with example (ExampleModelTests.swift). To enable: add separate test target in XcodeGen config + scheme. CI note in workflow.
    entitlements:
      path: WineNative/Resources/WineNative.entitlements
    settings:
      base:
        PRODUCT_NAME: Weeno
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

  # Priority 2: Test target wired (XcodeGen). Includes ExampleModelTests + can add mocks.
  # To build: xcodegen ; xcodebuild test -project WineNative.xcodeproj -scheme WineNativeTests -destination 'platform=iOS Simulator,name=iPhone 16'
  WineNativeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WineNative/Tests
    dependencies:
      - target: WineNative
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Weeno.app/Weeno"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  WineNative:
    build:
      targets:
        WineNative: all
    run:
      config: Debug
    archive:
      config: Release
  # Test scheme for CI
  WineNativeTests:
    build:
      targets:
        WineNativeTests: all
    test:
      targets:
        - WineNativeTests