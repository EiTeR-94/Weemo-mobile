name: WineNative
options:
  bundleIdPrefix: fr.eiter
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: WineNative/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: fr.eiter.plexiwine
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "10"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    DEVELOPMENT_TEAM: ""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  WineNative:
    type: application
    platform: iOS
    sources:
      # Coque WebView uniquement (= webapp) — pas d'UI native Beer
      - path: WineNative/Sources/WineNativeApp.swift
      - path: WineNative/Sources/WeenoWebShellView.swift
      - path: WineNative/Resources/Assets.xcassets
    entitlements:
      path: WineNative/Resources/WineNative.entitlements
    settings:
      base:
        PRODUCT_NAME: Weeno
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

schemes:
  WineNative:
    build:
      targets:
        WineNative: all
    run:
      config: Debug
    archive:
      config: Release
