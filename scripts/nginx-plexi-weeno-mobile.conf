# Weeno — téléchargements directs APK + IPA (WAN :443 + LAN :8444)
#   https://eiter.freeboxos.fr/mobile/wine/weenooff.apk
#   https://eiter.freeboxos.fr/mobile/wine/weenooff.ipa
# Répertoire : /var/www/wine-mobile/

location = /mobile/wine/weenooff.apk {
    allow all;
    limit_req zone=apk_dl_limit burst=12 nodelay;
    limit_conn apk_dl_conn 4;
    limit_rate 8m;
    limit_req_status 429;
    limit_conn_status 429;
    alias /var/www/wine-mobile/weenooff.apk;
    default_type application/vnd.android.package-archive;
    add_header Cache-Control "no-store" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Content-Disposition "attachment; filename=\"weenooff.apk\"" always;
}

location = /mobile/wine/weenooff.ipa {
    allow all;
    limit_req zone=apk_dl_limit burst=12 nodelay;
    limit_conn apk_dl_conn 4;
    limit_rate 8m;
    limit_req_status 429;
    limit_conn_status 429;
    alias /var/www/wine-mobile/weenooff.ipa;
    default_type application/octet-stream;
    add_header Cache-Control "no-store" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Content-Disposition "attachment; filename=\"weenooff.ipa\"" always;
}

# Noms PascalCase → minuscules
location = /mobile/wine/WeenoOff.apk {
    return 301 /mobile/wine/weenooff.apk;
}
location = /mobile/wine/WeenoOff.ipa {
    return 301 /mobile/wine/weenooff.ipa;
}

location = /mobile/wine {
    return 301 /mobile/wine/;
}
location = /mobile/wine/ {
    return 302 /mobile/wine/index.html;
}
location = /mobile/wine/index.html {
    allow all;
    limit_req zone=apk_dl_limit burst=20 nodelay;
    limit_conn apk_dl_conn 8;
    limit_req_status 429;
    alias /var/www/wine-mobile/index.html;
    default_type text/html;
    charset utf-8;
    add_header Cache-Control "no-store" always;
    add_header Access-Control-Allow-Origin "*" always;
}

location /mobile/wine/ {
    allow all;
    limit_req zone=apk_dl_limit burst=15 nodelay;
    limit_conn apk_dl_conn 6;
    limit_rate 4m;
    limit_req_status 429;
    alias /var/www/wine-mobile/;
    add_header Cache-Control "no-store" always;
    add_header Access-Control-Allow-Origin "*" always;
}
